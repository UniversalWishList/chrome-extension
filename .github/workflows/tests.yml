name: Chrome Extension Testing

on:
  pull_request:
  push:
    branches: [CI]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm start

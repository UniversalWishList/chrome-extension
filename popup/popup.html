<html>
    <head>
        <link rel="stylesheet" href="popup.css">
    </head>
    <body>
        <h1><u>Universal Wish List</u></h1>
        <div class="tabs">
            <button type="button" id="addTab">Add Item</button>
            <button type="button" id="settingsTab">Settings</button>
        </div>
        <br>
        <div id="addSection">
            <button type="button" id="addItemToList">Add item to list</button>
            <script src="addItemToList.js"></script>
            <br><br>  <!-- two line breaks to separate the button and drop-down -->
            <select class="list-dropdown" name="lists" id="list-select">
            <!-- value is what gets submitted to the server, text between the option tags is what gets displayed -->
            <!-- an option can be selected by default by adding the 'selected' attribute -->
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
        </select>
        <script src="updateListDropdown.js"></script>  <!-- run the updateListDropdown.js script -->
        </div>
        <br><br>
        <div id="settingsSection" style="display: none;">
        <label>
            API key:
        <input id="apiKey" type="password" autocomplete="off">
        </label>
        <button type="button" id="saveApiKey">Save API Key</button>
        <span id="apiKeyStatus"></span>
        <script src="popupStorage.js"></script>
        </div>
        <script src="popupTabs.js"></script>
    </body>
</html>
